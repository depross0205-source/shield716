name: Update Shield 7.16 Dashboard

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0點 (台灣時間早上8點) 執行
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run logic and generate HTML
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update dashboard" && git push)
